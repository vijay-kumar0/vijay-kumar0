<svg width="100%" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#00f7ff"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#bg)" />

  <!-- Hover Area -->
  <rect width="800" height="220" fill="transparent">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating Particles -->
  <circle cx="120" cy="180" r="3" fill="#00f7ff">
    <animate attributeName="cy" values="180;40;180" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="400" cy="200" r="2" fill="#00f7ff">
    <animate attributeName="cy" values="200;30;200" dur="7s" repeatCount="indefinite"/>
  </circle>

  <circle cx="650" cy="170" r="3" fill="#00f7ff">
    <animate attributeName="cy" values="170;50;170" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Typing Text -->
  <text x="50%" y="50%" text-anchor="middle" fill="#ffffff" font-size="26" font-family="monospace" filter="url(#glow)">
    <tspan>
      <animate attributeName="textLength"
               from="0" to="280"
               dur="4s"
               repeatCount="indefinite" />
      Vijay Kumar
    </tspan>
  </text>

  <!-- Sub Text -->
  <text x="50%" y="70%" text-anchor="middle" fill="#00f7ff" font-size="14" font-family="monospace">
    <tspan>
      <animate attributeName="opacity"
               values="0;1;0"
               dur="4s"
               repeatCount="indefinite"/>
      Building Systems...
    </tspan>
  </text>

</svg>
