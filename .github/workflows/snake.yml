name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: vijay-kumar0
          outputs: |
            dist/github-snake-dark.svg?color_snake=00f7ff&color_dots=#161b22,#0e7490,#22d3ee,#67e8f9,#a5f3fc
            dist/github-snake-light.svg?color_snake=ff4d6d&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
